<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — Tennis Markov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #fafaf6;
    --paper-2: #f0f1ea;
    --paper-dark: #e3e5d9;
    --ink: #1a1c18;
    --ink-2: #35382f;
    --mute: #7b7e72;
    --mute-2: #b3b6a8;
    --rule: #d5d8ca;
    --rule-soft: #e4e6da;
    --clay: #c55d3a;
    --clay-dark: #a94a2b;
    --blue: #2e5f8e;
    --blue-dark: #214a72;
    --court: #3f6b36;
    --court-dark: #244a1d;
    --ball: #d4e12a;
    --serif: 'Fraunces', 'Times New Roman', Georgia, serif;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'JetBrains Mono', 'IBM Plex Mono', Menlo, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper);
    color: var(--ink);
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; position: relative; overflow-x: hidden; }
  .page { position: relative; max-width: 1100px; margin: 0 auto; padding: 44px 56px 96px; }

  /* MASTHEAD */
  .masthead {
    text-align: center;
    padding: 16px 0 28px;
    border-bottom: 1px solid var(--court);
    margin-bottom: 36px;
    position: relative;
  }
  .masthead::after {
    content: ''; position: absolute; left: 50%; bottom: -5px; transform: translateX(-50%);
    width: 10px; height: 10px; background: var(--ball); border-radius: 50%;
    box-shadow: 0 0 0 2px var(--paper);
  }
  .masthead-date {
    font-family: var(--mono); font-size: 10.5px; letter-spacing: 0.22em;
    text-transform: uppercase; color: var(--mute); font-weight: 500;
    margin-bottom: 10px; font-feature-settings: "tnum";
  }
  .small-title {
    font-family: var(--serif); font-weight: 700; font-variation-settings: "opsz" 60;
    font-size: 32px; line-height: 1; letter-spacing: -0.02em; color: var(--ink);
  }
  .small-title em { font-style: italic; font-weight: 400; color: var(--court); }
  .view-nav {
    display: flex; align-items: center; gap: 0; justify-content: center; margin-top: 18px;
    flex-wrap: wrap;
  }
  .view-nav a {
    font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.28em;
    text-transform: uppercase; color: var(--mute); text-decoration: none;
    padding: 6px 18px; position: relative; transition: color 0.15s;
  }
  .view-nav a:hover { color: var(--ink); }
  .view-nav a + a::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 1px; height: 11px; background: var(--rule);
  }

  /* PLAYER HEADER */
  .player-hero {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  .player-tag {
    font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--mute); font-weight: 700;
    margin-bottom: 8px;
  }
  .player-tag .country {
    font-family: var(--mono); margin-left: 8px; color: var(--mute-2);
    letter-spacing: 0.04em;
  }
  .player-name {
    font-family: var(--serif); font-weight: 700; font-variation-settings: "opsz" 144;
    font-size: clamp(40px, 6vw, 72px); line-height: 0.95; letter-spacing: -0.025em;
    color: var(--ink);
  }
  .player-name.unknown { color: var(--clay-dark); }
  .player-elo {
    text-align: right; font-family: var(--mono); font-feature-settings: "tnum";
    color: var(--mute);
  }
  .player-elo .label {
    font-family: var(--sans); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.26em; text-transform: uppercase; display: block;
    margin-bottom: 4px;
  }
  .player-elo .value {
    font-family: var(--serif); font-weight: 700; font-variation-settings: "opsz" 48;
    font-size: 36px; line-height: 1; color: var(--ink); letter-spacing: -0.01em;
  }
  .player-elo .rank {
    font-family: var(--mono); font-size: 12px; color: var(--mute);
    margin-top: 6px; display: block;
  }

  /* SURFACE RATINGS */
  .sec-head {
    display: flex; align-items: center; gap: 10px;
    padding-bottom: 10px; border-bottom: 1px solid var(--court);
    margin-bottom: 18px; margin-top: 32px;
  }
  .sec-head::before {
    content: ''; width: 6px; height: 6px; background: var(--ball); border-radius: 50%;
  }
  .sec-title {
    font-family: var(--sans); font-size: 10.5px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase; color: var(--ink);
  }

  .surface-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    border: 1px solid var(--rule);
    background: var(--paper);
  }
  .surface-card {
    padding: 16px 18px;
    border-right: 1px solid var(--rule-soft);
    position: relative;
    overflow: hidden;
  }
  .surface-card:last-child { border-right: none; }
  .surface-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 3px;
    background: var(--rule);
  }
  .surface-card.s-hard::before  { background: var(--blue); }
  .surface-card.s-clay::before  { background: var(--clay); }
  .surface-card.s-grass::before { background: var(--court); }
  .surface-card.s-all::before   { background: var(--ink); }

  .surface-name {
    font-family: var(--sans); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.28em; text-transform: uppercase;
    margin-bottom: 12px;
  }
  .surface-card.s-hard  .surface-name { color: var(--blue-dark); }
  .surface-card.s-clay  .surface-name { color: var(--clay-dark); }
  .surface-card.s-grass .surface-name { color: var(--court-dark); }
  .surface-card.s-all   .surface-name { color: var(--ink); }

  .surface-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .surface-row:last-child { margin-bottom: 0; }
  .surface-row .label {
    font-family: var(--sans); font-size: 9.5px; font-weight: 600;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--mute);
  }
  .surface-row .num {
    font-family: var(--mono); font-feature-settings: "tnum";
    font-size: 14px; color: var(--ink); font-weight: 500;
  }
  .surface-row .num.big {
    font-family: var(--serif); font-weight: 600;
    font-variation-settings: "opsz" 24;
    font-size: 19px;
  }
  .surface-row .rank-tag {
    font-family: var(--mono); font-size: 10.5px; color: var(--mute);
    margin-left: 4px; font-feature-settings: "tnum";
  }

  /* STATS MATRIX */
  .stats-table {
    width: 100%; border-collapse: collapse; font-family: var(--mono);
    font-feature-settings: "tnum"; font-size: 13px;
    background: var(--paper); border: 1px solid var(--rule);
  }
  .stats-table th {
    background: var(--paper-2); padding: 10px 12px; text-align: left;
    font-family: var(--sans); font-size: 9.5px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--mute); border-bottom: 1px solid var(--court);
  }
  .stats-table th.num, .stats-table td.num { text-align: right; }
  .stats-table th.first, .stats-table td.first {
    font-family: var(--sans); font-size: 10px; font-weight: 700;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink);
    width: 110px;
  }
  .stats-table td {
    padding: 10px 12px; border-bottom: 1px dotted var(--rule-soft); color: var(--ink);
  }
  .stats-table tr:last-child td { border-bottom: none; }
  .stats-table td.spw { color: var(--court-dark); font-weight: 500; }
  .stats-table td.rpw { color: var(--ink); }
  .stats-table td.mc  { color: var(--mute); font-size: 12px; }
  .stats-table .surf-cell {
    border-left: 1px solid var(--rule-soft);
  }
  .stats-table .surf-hdr {
    text-align: center;
    font-size: 9px;
  }
  .stats-table .surf-hdr.s-hard  { color: var(--blue-dark);  background: var(--paper); }
  .stats-table .surf-hdr.s-clay  { color: var(--clay-dark);  background: var(--paper); }
  .stats-table .surf-hdr.s-grass { color: var(--court-dark); background: var(--paper); }
  .stats-table .surf-hdr.s-all   { color: var(--ink);        background: var(--paper); }

  .empty {
    padding: 60px 20px; text-align: center;
    font-family: var(--serif); font-style: italic; color: var(--mute);
    font-size: 16px; line-height: 1.5;
  }
  .empty a {
    color: var(--court-dark); text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* RESPONSIVE */
  @media (max-width: 820px) {
    .page { padding: 28px 18px 56px; }
    .player-hero { grid-template-columns: 1fr; gap: 14px; align-items: start; }
    .player-elo { text-align: left; }
    .surface-grid { grid-template-columns: repeat(2, 1fr); }
    .surface-card { border-right: 1px solid var(--rule-soft); border-bottom: 1px solid var(--rule-soft); }
    .surface-card:nth-child(2n) { border-right: none; }
    .surface-card:nth-last-child(-n+2) { border-bottom: none; }
    .stats-table th, .stats-table td { padding: 8px 8px; font-size: 12px; }
    .stats-table th.first, .stats-table td.first { width: 90px; }
  }
  @media (max-width: 540px) {
    .player-name { font-size: 32px; }
    .surface-grid { grid-template-columns: 1fr; }
    .surface-card { border-right: none; border-bottom: 1px solid var(--rule-soft); }
    .surface-card:last-child { border-bottom: none; }
    .stats-table th.s-grass, .stats-table td.s-grass { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <div class="masthead-date" id="masthead-date">—</div>
    <h2 class="small-title">Tennis <em>Markov</em></h2>
    <nav class="view-nav" aria-label="Views">
      <a href="index.html">Match Simulator</a>
      <a href="rankings.html">Power Rankings</a>
      <a href="tournaments.html">Tournaments</a>
    </nav>
  </header>

  <div id="content"></div>
</div>

<script src="model.js"></script>
<script>
const {
  TOUR_AVG_BY_SURFACE, TOUR_SOURCES,
  parseCSV, filterActive, parseEloCSV,
  effectiveStats, sampleSize, hasRecentData, eloForSurface,
  allPlayRanking, nameKey, buildNameLookup,
} = TennisModel;

const RECENCY = 0.70;
const ELO_WEIGHT = 0.65;

const state = {
  players: { atp: {}, wta: {} },
  elos:    { atp: {}, wta: {} },
  lookup:  { atp: {}, wta: {} },
  rankings:{ atp: {}, wta: {} },  // {surface: [...]}
};

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function tryFetch(url) {
  try {
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

async function loadTour(tour) {
  const src = TOUR_SOURCES[tour];
  const [csv, elocsv] = await Promise.all([
    tryFetch(src.csv),
    tryFetch(src.elo),
  ]);
  state.players[tour] = filterActive(parseCSV(csv || src.fallback));
  state.elos[tour] = elocsv ? parseEloCSV(elocsv) : {};
  state.lookup[tour] = buildNameLookup(state.players[tour]);
}

function findPlayer(name) {
  const k = nameKey(name);
  for (const tour of ['atp', 'wta']) {
    const real = state.lookup[tour][k];
    if (real) return { tour, canonical: real, rows: state.players[tour][real] };
  }
  return null;
}

function rankFromElo(eloMap, key) {
  const entries = Object.entries(eloMap)
    .map(([n, e]) => ({ n, v: e[key] }))
    .filter(x => x.v != null)
    .sort((a, b) => b.v - a.v);
  const map = {};
  entries.forEach((e, i) => { map[e.n] = i + 1; });
  return { map, total: entries.length };
}

function pctFmt(p, d = 1) {
  return p == null || !isFinite(p) ? '—' : (p * 100).toFixed(d) + '%';
}
function numFmt(x, d = 3) {
  return x == null || !isFinite(x) ? '—' : x.toFixed(d);
}

function ensureRanking(tour, surface) {
  state.rankings[tour] = state.rankings[tour] || {};
  if (state.rankings[tour][surface]) return state.rankings[tour][surface];
  // Use the same defaults as the live rankings page so numbers agree.
  const r = allPlayRanking(state.players[tour], tour, surface, {
    recencyWeight: RECENCY,
    minMatches: 0,           // include everyone — we filter on display elsewhere
    elos: state.elos[tour],
    eloWeight: ELO_WEIGHT,
  });
  state.rankings[tour][surface] = r;
  return r;
}

function fieldWinRate(tour, surface, name) {
  const r = ensureRanking(tour, surface);
  const me = r.find(x => x.name === name);
  if (!me) return null;
  const idx = r.indexOf(me);
  return { rate: me.rate, rank: idx + 1, total: r.length };
}

function renderSurfaceCard(label, klass, eloVal, eloRank, eloTotal, fwr) {
  const eloRankStr = (eloRank && eloTotal) ? `#${eloRank} of ${eloTotal}` : '—';
  return `
    <div class="surface-card s-${klass}">
      <div class="surface-name">${escapeHtml(label)}</div>
      <div class="surface-row">
        <span class="label">Elo</span>
        <span><span class="num big">${eloVal != null ? Math.round(eloVal) : '—'}</span><span class="rank-tag">${eloRankStr}</span></span>
      </div>
      <div class="surface-row">
        <span class="label">Field W%</span>
        <span><span class="num big">${fwr ? pctFmt(fwr.rate) : '—'}</span><span class="rank-tag">${fwr ? '#' + fwr.rank : '—'}</span></span>
      </div>
    </div>
  `;
}

function renderStatsTable(rows) {
  const surfaces = ['hard', 'clay', 'grass', 'all'];
  const periods = [['52week', 'Last 52 Weeks'], ['career', 'Career']];

  let html = `<table class="stats-table">
    <thead>
      <tr>
        <th class="first">Period</th>`;
  for (const s of surfaces) {
    html += `<th class="num surf-cell surf-hdr s-${s}" colspan="3">${escapeHtml(s)}</th>`;
  }
  html += `</tr><tr>
        <th class="first"></th>`;
  for (const s of surfaces) {
    html += `<th class="num surf-cell">SPW</th><th class="num">RPW</th><th class="num">M</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const [pkey, plabel] of periods) {
    html += `<tr><td class="first">${escapeHtml(plabel)}</td>`;
    for (const s of surfaces) {
      const r = rows[`${s}|${pkey}`] || rows[`all|${pkey}`];
      if (r) {
        html += `<td class="num spw surf-cell">${pctFmt(r.spw)}</td>`;
        html += `<td class="num rpw">${pctFmt(r.rpw)}</td>`;
        html += `<td class="num mc">${r.matches != null ? r.matches : '—'}</td>`;
      } else {
        html += `<td class="num surf-cell">—</td><td class="num">—</td><td class="num">—</td>`;
      }
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function renderPlayer(name) {
  const found = findPlayer(name);
  const content = $('content');
  if (!found) {
    content.innerHTML = `<div class="empty">
      <p><strong style="font-family:var(--serif);font-weight:700;font-style:normal;font-size:22px;color:var(--clay-dark);display:block;margin-bottom:12px;">${escapeHtml(name)}</strong></p>
      <p>No data on file. The roster only includes players with at least one tour-level match in the last 52 weeks.</p>
      <p style="margin-top:12px;"><a href="rankings.html">← Back to rankings</a></p>
    </div>`;
    document.title = `${name} — Tennis Markov`;
    return;
  }
  const { tour, canonical, rows } = found;
  document.title = `${canonical} — Tennis Markov`;

  // Elo + ranks
  const eloRow = state.elos[tour][canonical] || null;
  const overallRank   = rankFromElo(state.elos[tour], 'elo');
  const hardRank      = rankFromElo(state.elos[tour], 'hElo');
  const clayRank      = rankFromElo(state.elos[tour], 'cElo');
  const grassRank     = rankFromElo(state.elos[tour], 'gElo');

  // Get country code from one of the slot-style references? We don't have it here directly;
  // surface the tour as the secondary label.
  const tourLabel = tour.toUpperCase();

  // Hero
  let html = `<div class="player-hero">
    <div>
      <div class="player-tag">${tourLabel} player</div>
      <h1 class="player-name">${escapeHtml(canonical)}</h1>
    </div>
    <div class="player-elo">
      <span class="label">Overall Elo</span>
      <span class="value">${eloRow && eloRow.elo != null ? Math.round(eloRow.elo) : '—'}</span>
      <span class="rank">${eloRow && eloRow.elo != null && overallRank.map[canonical] ? `#${overallRank.map[canonical]} of ${overallRank.total}` : '—'}</span>
    </div>
  </div>`;

  // Surface ratings — async because Field W% needs all-play ranking compute
  html += `<div class="sec-head"><span class="sec-title">Ratings by surface</span></div>
    <div class="surface-grid" id="surfaceGrid">
      <div class="surface-card s-hard"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-clay"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-grass"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-all"><div class="surface-name">Computing…</div></div>
    </div>`;

  html += `<div class="sec-head"><span class="sec-title">Service & return rates</span></div>`;
  html += renderStatsTable(rows);

  html += `<div style="margin-top:36px;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--mute);font-variation-settings:'opsz' 14;">
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">SPW</strong> = service points won;
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">RPW</strong> = return points won;
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">M</strong> = tour-level matches in the period.
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">Field W%</strong> is the average analytic Bo3 win probability against every other active peer on that surface (recency 0.70, Elo blend 0.65).
  </div>`;

  content.innerHTML = html;

  // Compute Field W% asynchronously — yields a frame so the page paints first.
  setTimeout(() => {
    const grid = $('surfaceGrid');
    const surfaces = [
      { surface: 'hard',  label: 'Hard',         klass: 'hard',  elo: eloRow && eloRow.hElo, ranks: hardRank  },
      { surface: 'clay',  label: 'Clay',         klass: 'clay',  elo: eloRow && eloRow.cElo, ranks: clayRank  },
      { surface: 'grass', label: 'Grass',        klass: 'grass', elo: eloRow && eloRow.gElo, ranks: grassRank },
      { surface: 'all',   label: 'All Surfaces', klass: 'all',   elo: eloRow && eloRow.elo,  ranks: overallRank },
    ];
    let cardsHtml = '';
    for (const s of surfaces) {
      const fwr = fieldWinRate(tour, s.surface, canonical);
      cardsHtml += renderSurfaceCard(s.label, s.klass, s.elo, s.ranks.map[canonical], s.ranks.total, fwr);
    }
    grid.outerHTML = `<div class="surface-grid">${cardsHtml}</div>`;
  }, 0);
}

async function init() {
  $('masthead-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });

  const params = new URLSearchParams(window.location.search);
  const name = (params.get('p') || '').trim();
  if (!name) {
    $('content').innerHTML = `<div class="empty">
      <p>No player specified.</p>
      <p style="margin-top:12px;"><a href="rankings.html">Browse Power Rankings</a> to pick someone.</p>
    </div>`;
    return;
  }

  await Promise.all([loadTour('atp'), loadTour('wta')]);
  renderPlayer(name);
}

init();
</script>
</body>
</html>
