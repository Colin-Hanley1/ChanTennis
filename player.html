<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — Tennis Markov</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><circle cx='8' cy='8' r='6' fill='none' stroke='%232f5d2f' stroke-width='1.2'/><path d='M2.5 8 Q8 4 13.5 8' fill='none' stroke='%232f5d2f' stroke-width='1'/></svg>">
<style>
  :root {
    --bg: #fbfbfa;
    --fg: #181818;
    --mute: #6e6e6e;
    --rule: #e5e5e3;
    --accent: #2f5d2f;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --mono: 'IBM Plex Mono', Menlo, Consolas, monospace;
    /* Legacy variable aliases — preserved so any inline-style hooks in the JS
       that reference --ink-2, --clay-dark, --serif still resolve to something
       reasonable in the restrained palette. */
    --ink-2: #181818;
    --clay-dark: #181818;
    --serif: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  body { min-height: 100vh; }
  .page { max-width: 1000px; margin: 0 auto; padding: 32px 40px 80px; }

  a { color: var(--fg); text-decoration: none; }
  a:hover { color: var(--accent); }

  /* MASTHEAD */
  .masthead {
    display: flex;
    align-items: center;
    gap: 14px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .mark { width: 14px; height: 14px; flex-shrink: 0; }
  .mark circle { fill: none; stroke: var(--accent); stroke-width: 1.2; }
  .mark path { fill: none; stroke: var(--accent); stroke-width: 1; }
  .small-title {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 16px;
    letter-spacing: -0.005em;
    color: var(--fg);
    margin-right: 4px;
  }
  .masthead-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mute);
    font-feature-settings: "tnum";
    margin-left: auto;
  }
  .view-nav { display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .view-nav a { font-size: 13px; color: var(--mute); }
  .view-nav a:hover { color: var(--fg); }

  /* PLAYER HERO */
  .player-hero {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 28px;
  }
  .player-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 6px;
  }
  .player-tag .country {
    font-family: var(--mono);
    margin-left: 8px;
    color: var(--mute);
  }
  .player-name {
    font-family: var(--sans);
    font-weight: 600;
    font-size: 24px;
    line-height: 1.1;
    letter-spacing: -0.01em;
    color: var(--fg);
  }
  .player-name.unknown { color: var(--fg); }
  .player-elo {
    text-align: right;
    font-family: var(--mono);
    font-feature-settings: "tnum";
    color: var(--mute);
  }
  .player-elo .label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    color: var(--mute);
    display: block;
    margin-bottom: 4px;
  }
  .player-elo .value {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 20px;
    line-height: 1;
    color: var(--fg);
  }
  .player-elo .rank {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mute);
    margin-top: 4px;
    display: block;
  }

  /* SECTION HEADER */
  .sec-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 14px;
    margin-top: 28px;
  }
  .sec-title {
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 500;
    color: var(--fg);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* SURFACE GRID — rendered by JS as 4 .surface-card divs.
     We restyle them in place as a simple table-like 4-row block,
     no color stripes, no colored accents per surface. */
  .surface-grid {
    border-top: 1px solid var(--fg);
    border-bottom: 1px solid var(--rule);
  }
  .surface-card {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    column-gap: 24px;
    align-items: baseline;
    padding: 10px 12px;
    border-bottom: 1px solid var(--rule);
  }
  .surface-card:last-child { border-bottom: none; }
  .surface-card .surface-name {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    color: var(--fg);
    letter-spacing: 0;
    text-transform: none;
    /* Override any surface-specific color */
  }
  .surface-card.s-hard .surface-name,
  .surface-card.s-clay .surface-name,
  .surface-card.s-grass .surface-name,
  .surface-card.s-all .surface-name { color: var(--fg); }

  .surface-card .surface-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 8px;
  }
  .surface-card .surface-row .label {
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .surface-card .surface-row .num {
    font-family: var(--mono);
    font-feature-settings: "tnum";
    font-size: 13px;
    color: var(--fg);
    font-weight: 400;
  }
  .surface-card .surface-row .num.big {
    font-family: var(--mono);
    font-weight: 500;
    font-size: 14px;
  }
  .surface-card .surface-row .rank-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--mute);
    margin-left: 6px;
    font-feature-settings: "tnum";
  }

  /* STATS TABLE */
  .stats-table {
    width: 100%; border-collapse: collapse; font-family: var(--mono);
    font-feature-settings: "tnum"; font-size: 12px;
  }
  .stats-table th {
    padding: 8px 10px;
    text-align: left;
    font-family: var(--sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--mute);
    border-top: 1px solid var(--fg);
    border-bottom: 1px solid var(--rule);
    background: var(--bg);
  }
  .stats-table th.num, .stats-table td.num { text-align: right; }
  .stats-table th.first, .stats-table td.first {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 500;
    color: var(--fg);
    width: 110px;
    text-transform: none;
    letter-spacing: 0;
  }
  .stats-table td {
    padding: 8px 10px; border-bottom: 1px solid var(--rule); color: var(--fg);
  }
  .stats-table tr:last-child td { border-bottom: 1px solid var(--rule); }
  .stats-table td.spw, .stats-table td.rpw { color: var(--fg); }
  .stats-table td.mc  { color: var(--mute); }
  .stats-table .surf-cell {
    border-left: 1px solid var(--rule);
  }
  .stats-table .surf-hdr {
    text-align: center;
    font-size: 10px;
    color: var(--mute);
    text-transform: lowercase;
    letter-spacing: 0;
    background: var(--bg);
  }
  /* Override any inherited per-surface coloring from the surf-hdr classes */
  .stats-table .surf-hdr.s-hard,
  .stats-table .surf-hdr.s-clay,
  .stats-table .surf-hdr.s-grass,
  .stats-table .surf-hdr.s-all { color: var(--mute); }

  .empty {
    padding: 50px 20px; text-align: center;
    color: var(--mute);
    font-size: 14px; line-height: 1.55;
  }
  .empty a {
    color: var(--accent); text-decoration: underline;
    text-underline-offset: 3px;
  }

  /* RESPONSIVE */
  @media (max-width: 820px) {
    .page { padding: 24px 18px 56px; }
    .player-hero { grid-template-columns: 1fr; gap: 12px; align-items: start; }
    .player-elo { text-align: left; }
    .surface-card { grid-template-columns: 1fr; row-gap: 6px; }
    .stats-table th, .stats-table td { padding: 7px 7px; font-size: 11px; }
    .stats-table th.first, .stats-table td.first { width: 90px; }
    .masthead-date { margin-left: 0; flex-basis: 100%; }
  }
  @media (max-width: 540px) {
    .stats-table th.s-grass, .stats-table td.s-grass { display: none; }
  }

  .data-credit {
    border-top: 1px solid var(--rule);
    padding: 16px 0 24px;
    margin-top: 48px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--fg);
    opacity: 0.75;
    line-height: 1.5;
  }
  .data-credit a { text-decoration: underline; color: var(--fg); }
  .data-credit em { font-style: normal; color: var(--fg); }
</style>
</head>
<body>
<div class="page">

  <header class="masthead">
    <svg class="mark" viewBox="0 0 16 16" aria-hidden="true">
      <circle cx="8" cy="8" r="6"/>
      <path d="M2.5 8 Q8 4 13.5 8"/>
    </svg>
    <h2 class="small-title">Tennis Markov</h2>
    <nav class="view-nav" aria-label="Views">
      <a href="index.html">Match Simulator</a>
      <a href="rankings.html">Power Rankings</a>
      <a href="tournaments.html">Tournaments</a>
      <a href="backtest.html">Backtest</a>
    </nav>
    <div class="masthead-date" id="masthead-date">—</div>
  </header>

  <div id="content"></div>

  <footer class="data-credit">
    <p>Player statistics scraped from <a href="http://www.tennisabstract.com/" target="_blank" rel="noopener"><em>Tennis Abstract</em></a> by Jeff Sackmann, used under <a href="https://creativecommons.org/licenses/by-nc-sa/4.0/" target="_blank" rel="noopener">CC BY-NC-SA 4.0</a>.</p>
  </footer>
</div>

<script src="model.js"></script>
<script>
const {
  TOUR_AVG_BY_SURFACE, TOUR_SOURCES,
  parseCSV, filterActive, parseEloCSV,
  effectiveStats, sampleSize, hasRecentData, eloForSurface,
  allPlayRanking, nameKey, buildNameLookup,
} = TennisModel;

const RECENCY = 0.70;
const ELO_WEIGHT = 0.65;

const state = {
  players: { atp: {}, wta: {} },
  elos:    { atp: {}, wta: {} },
  lookup:  { atp: {}, wta: {} },
  rankings:{ atp: {}, wta: {} },  // {surface: [...]}
};

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

async function tryFetch(url) {
  try {
    const r = await fetch(url, { cache: 'no-cache' });
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

async function loadTour(tour) {
  const src = TOUR_SOURCES[tour];
  const [csv, elocsv] = await Promise.all([
    tryFetch(src.csv),
    tryFetch(src.elo),
  ]);
  state.players[tour] = filterActive(parseCSV(csv || src.fallback));
  state.elos[tour] = elocsv ? parseEloCSV(elocsv) : {};
  state.lookup[tour] = buildNameLookup(state.players[tour]);
}

function findPlayer(name) {
  const k = nameKey(name);
  for (const tour of ['atp', 'wta']) {
    const real = state.lookup[tour][k];
    if (real) return { tour, canonical: real, rows: state.players[tour][real] };
  }
  return null;
}

function rankFromElo(eloMap, key) {
  const entries = Object.entries(eloMap)
    .map(([n, e]) => ({ n, v: e[key] }))
    .filter(x => x.v != null)
    .sort((a, b) => b.v - a.v);
  const map = {};
  entries.forEach((e, i) => { map[e.n] = i + 1; });
  return { map, total: entries.length };
}

function pctFmt(p, d = 1) {
  return p == null || !isFinite(p) ? '—' : (p * 100).toFixed(d) + '%';
}
function numFmt(x, d = 3) {
  return x == null || !isFinite(x) ? '—' : x.toFixed(d);
}

function ensureRanking(tour, surface) {
  state.rankings[tour] = state.rankings[tour] || {};
  if (state.rankings[tour][surface]) return state.rankings[tour][surface];
  // Use the same defaults as the live rankings page so numbers agree.
  const r = allPlayRanking(state.players[tour], tour, surface, {
    recencyWeight: RECENCY,
    minMatches: 0,           // include everyone — we filter on display elsewhere
    elos: state.elos[tour],
    eloWeight: ELO_WEIGHT,
  });
  state.rankings[tour][surface] = r;
  return r;
}

function fieldWinRate(tour, surface, name) {
  const r = ensureRanking(tour, surface);
  const me = r.find(x => x.name === name);
  if (!me) return null;
  const idx = r.indexOf(me);
  return { rate: me.rate, rank: idx + 1, total: r.length };
}

function renderSurfaceCard(label, klass, eloVal, eloRank, eloTotal, fwr) {
  const eloRankStr = (eloRank && eloTotal) ? `#${eloRank} of ${eloTotal}` : '—';
  return `
    <div class="surface-card s-${klass}">
      <div class="surface-name">${escapeHtml(label)}</div>
      <div class="surface-row">
        <span class="label">Elo</span>
        <span><span class="num big">${eloVal != null ? Math.round(eloVal) : '—'}</span><span class="rank-tag">${eloRankStr}</span></span>
      </div>
      <div class="surface-row">
        <span class="label">Field W%</span>
        <span><span class="num big">${fwr ? pctFmt(fwr.rate) : '—'}</span><span class="rank-tag">${fwr ? '#' + fwr.rank : '—'}</span></span>
      </div>
    </div>
  `;
}

function renderStatsTable(rows) {
  const surfaces = ['hard', 'clay', 'grass', 'all'];
  const periods = [['52week', 'Last 52 Weeks'], ['career', 'Career']];

  let html = `<table class="stats-table">
    <thead>
      <tr>
        <th class="first">Period</th>`;
  for (const s of surfaces) {
    html += `<th class="num surf-cell surf-hdr s-${s}" colspan="3">${escapeHtml(s)}</th>`;
  }
  html += `</tr><tr>
        <th class="first"></th>`;
  for (const s of surfaces) {
    html += `<th class="num surf-cell">SPW</th><th class="num">RPW</th><th class="num">M</th>`;
  }
  html += `</tr></thead><tbody>`;

  for (const [pkey, plabel] of periods) {
    html += `<tr><td class="first">${escapeHtml(plabel)}</td>`;
    for (const s of surfaces) {
      const r = rows[`${s}|${pkey}`] || rows[`all|${pkey}`];
      if (r) {
        html += `<td class="num spw surf-cell">${pctFmt(r.spw)}</td>`;
        html += `<td class="num rpw">${pctFmt(r.rpw)}</td>`;
        html += `<td class="num mc">${r.matches != null ? r.matches : '—'}</td>`;
      } else {
        html += `<td class="num surf-cell">—</td><td class="num">—</td><td class="num">—</td>`;
      }
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  return html;
}

function renderPlayer(name) {
  const found = findPlayer(name);
  const content = $('content');
  if (!found) {
    content.innerHTML = `<div class="empty">
      <p><strong style="font-family:var(--serif);font-weight:700;font-style:normal;font-size:22px;color:var(--clay-dark);display:block;margin-bottom:12px;">${escapeHtml(name)}</strong></p>
      <p>No data on file. The roster only includes players with at least one tour-level match in the last 52 weeks.</p>
      <p style="margin-top:12px;"><a href="rankings.html">← Back to rankings</a></p>
    </div>`;
    document.title = `${name} — Tennis Markov`;
    return;
  }
  const { tour, canonical, rows } = found;
  document.title = `${canonical} — Tennis Markov`;

  // Elo + ranks
  const eloRow = state.elos[tour][canonical] || null;
  const overallRank   = rankFromElo(state.elos[tour], 'elo');
  const hardRank      = rankFromElo(state.elos[tour], 'hElo');
  const clayRank      = rankFromElo(state.elos[tour], 'cElo');
  const grassRank     = rankFromElo(state.elos[tour], 'gElo');

  // Get country code from one of the slot-style references? We don't have it here directly;
  // surface the tour as the secondary label.
  const tourLabel = tour.toUpperCase();

  // Hero
  let html = `<div class="player-hero">
    <div>
      <div class="player-tag">${tourLabel} player</div>
      <h1 class="player-name">${escapeHtml(canonical)}</h1>
    </div>
    <div class="player-elo">
      <span class="label">Overall Elo</span>
      <span class="value">${eloRow && eloRow.elo != null ? Math.round(eloRow.elo) : '—'}</span>
      <span class="rank">${eloRow && eloRow.elo != null && overallRank.map[canonical] ? `#${overallRank.map[canonical]} of ${overallRank.total}` : '—'}</span>
    </div>
  </div>`;

  // Surface ratings — async because Field W% needs all-play ranking compute
  html += `<div class="sec-head"><span class="sec-title">Ratings by surface</span></div>
    <div class="surface-grid" id="surfaceGrid">
      <div class="surface-card s-hard"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-clay"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-grass"><div class="surface-name">Computing…</div></div>
      <div class="surface-card s-all"><div class="surface-name">Computing…</div></div>
    </div>`;

  html += `<div class="sec-head"><span class="sec-title">Service & return rates</span></div>`;
  html += renderStatsTable(rows);

  html += `<div style="margin-top:36px;font-family:var(--serif);font-style:italic;font-size:13px;color:var(--mute);font-variation-settings:'opsz' 14;">
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">SPW</strong> = service points won;
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">RPW</strong> = return points won;
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">M</strong> = tour-level matches in the period.
    <strong style="font-style:normal;color:var(--ink-2);font-weight:600;">Field W%</strong> is the average analytic Bo3 win probability against every other active peer on that surface (recency 0.70, Elo blend 0.65).
  </div>`;

  content.innerHTML = html;

  // Compute Field W% asynchronously — yields a frame so the page paints first.
  setTimeout(() => {
    const grid = $('surfaceGrid');
    const surfaces = [
      { surface: 'hard',  label: 'Hard',         klass: 'hard',  elo: eloRow && eloRow.hElo, ranks: hardRank  },
      { surface: 'clay',  label: 'Clay',         klass: 'clay',  elo: eloRow && eloRow.cElo, ranks: clayRank  },
      { surface: 'grass', label: 'Grass',        klass: 'grass', elo: eloRow && eloRow.gElo, ranks: grassRank },
      { surface: 'all',   label: 'All Surfaces', klass: 'all',   elo: eloRow && eloRow.elo,  ranks: overallRank },
    ];
    let cardsHtml = '';
    for (const s of surfaces) {
      const fwr = fieldWinRate(tour, s.surface, canonical);
      cardsHtml += renderSurfaceCard(s.label, s.klass, s.elo, s.ranks.map[canonical], s.ranks.total, fwr);
    }
    grid.outerHTML = `<div class="surface-grid">${cardsHtml}</div>`;
  }, 0);
}

async function init() {
  $('masthead-date').textContent = new Date().toLocaleDateString('en-US', {
    weekday: 'long', day: 'numeric', month: 'long', year: 'numeric',
  });

  const params = new URLSearchParams(window.location.search);
  const name = (params.get('p') || '').trim();
  if (!name) {
    $('content').innerHTML = `<div class="empty">
      <p>No player specified.</p>
      <p style="margin-top:12px;"><a href="rankings.html">Browse Power Rankings</a> to pick someone.</p>
    </div>`;
    return;
  }

  await Promise.all([loadTour('atp'), loadTour('wta')]);
  renderPlayer(name);
}

init();
</script>
</body>
</html>
